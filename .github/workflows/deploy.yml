name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  #main branch used for deployment

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js environment
      uses: actions/setup-node@v3
      with:
        node-version: '20'  # Using Node.js 20

    - name: Install dependencies
      run: npm install

    - name: Build project
      run: npm run build # Optional in case a build step is required in future

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./  # in future ddjust this to the build directory (e.g., `./dist` or `./build`)
